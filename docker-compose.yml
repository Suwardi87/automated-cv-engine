services:
  postgres:
    image: postgres:16-alpine
    container_name: omnisync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: omnisync
      POSTGRES_USER: omnisync
      POSTGRES_PASSWORD: omnisync_secret
    ports:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnisync"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: omnisync-redis
    restart: unless-stopped
    ports:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nestjs-api:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.nestjs.dev
    container_name: omnisync-nestjs
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "9000"
    volumes:
      - ./backend:/app
      - nestjs_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: omnisync-nginx
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - nestjs-api
      - nuxt-public
      - nuxt-cms

  nuxt-public:
    build:
      context: .
      dockerfile: Dockerfile.nuxt.public
    container_name: omnisync-nuxt-public
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - ./frontend-public:/app
      - nuxt_public_modules:/app/node_modules
      - nuxt_public_nuxt:/app/.nuxt
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8082/api
      NUXT_API_BASE_SSR: http://nestjs-api:9000/api
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
    depends_on:
      - nestjs-api

  nuxt-cms:
    build:
      context: .
      dockerfile: Dockerfile.nuxt.cms
    container_name: omnisync-nuxt-cms
    restart: unless-stopped
    expose:
      - "3001"
    volumes:
      - ./frontend-cms:/app
      - nuxt_cms_modules:/app/node_modules
      - nuxt_cms_nuxt:/app/.nuxt
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8082/api
      NUXT_API_BASE_SSR: http://nestjs-api:9000/api
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3001
    depends_on:
      - nestjs-api

volumes:
  postgres_data:
  redis_data:
  nestjs_modules:
  nuxt_public_modules:
  nuxt_public_nuxt:
  nuxt_cms_modules:
  nuxt_cms_nuxt:
