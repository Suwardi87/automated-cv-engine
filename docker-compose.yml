services:
  postgres:
    image: postgres:16-alpine
    container_name: omnisync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: omnisync
      POSTGRES_USER: omnisync
      POSTGRES_PASSWORD: omnisync_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnisync"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: omnisync-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  laravel-api:
    build:
      context: .
      dockerfile: Dockerfile.laravel
    container_name: omnisync-laravel
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./storage-laravel:/var/www/storage
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: omnisync
      DB_USERNAME: omnisync
      DB_PASSWORD: omnisync_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "9000"

  laravel-queue:
    build:
      context: .
      dockerfile: Dockerfile.laravel
    container_name: omnisync-queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./storage-laravel:/var/www/storage
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: omnisync
      DB_USERNAME: omnisync
      DB_PASSWORD: omnisync_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_ENV: local
      APP_DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=300

  nginx:
    image: nginx:alpine
    container_name: omnisync-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laravel-api

  nuxt-frontend:
    build:
      context: .
      dockerfile: Dockerfile.nuxt
    container_name: omnisync-nuxt
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8080/api
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
    depends_on:
      - laravel-api

volumes:
  postgres_data:
  redis_data:
